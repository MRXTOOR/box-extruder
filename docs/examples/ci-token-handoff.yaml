# Handoff template for development teams (after AppSec admin runs dast-cli ci setup).
# Store ci_token in Jenkins as Secret text — never commit to git.

dast:
  api_url: https://dast.corp.example
  ci_token: dast_xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Jenkins Secret text credential
  jenkins_credential_id: dast-ci-consumer-api

scan:
  target_url: https://my-service.example.com
  auth_url: https://my-service.example.com/api/v1/auth/login   # optional; auto-discovery if omitted
  app_login_credential_id: myapp-staging-login                 # Jenkins Username/Password
  preset: Fast
  fail_on: HIGH
  report_formats:
    - docx
    - html
    - pdf

