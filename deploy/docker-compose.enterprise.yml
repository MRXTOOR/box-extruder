version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dast-postgres
    environment:
      POSTGRES_USER: dast
      POSTGRES_PASSWORD: dast
      POSTGRES_DB: dast
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dast"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dast-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dast-server:
    build:
      context: ..
      dockerfile: Dockerfile.server
    container_name: deploy-dast-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=dast
      - DB_PASS=dast
      - DB_NAME=dast
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - WORK_DIR=/workspace/work
    volumes:
      - dast_work:/workspace/work
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dast-worker:
    build:
      context: ..
      dockerfile: Dockerfile.worker
    container_name: deploy-dast-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=dast
      - DB_PASS=dast
      - DB_NAME=dast
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORK_DIR=/workspace/work
    volumes:
      - dast_work:/workspace/work
      - /var/run/docker.sock:/var/run/docker.sock

  frontend:
    build:
      context: ../web/react
      dockerfile: Dockerfile
    container_name: deploy-frontend
    ports:
      - "3001:80"

  nginx:
    image: nginx:alpine
    container_name: deploy-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - dast-server
      - frontend

volumes:
  postgres_data:
  dast_work: