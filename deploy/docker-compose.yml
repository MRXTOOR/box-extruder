# Запуск из корня репозитория: docker compose -f deploy/docker-compose.yml up -d
# Или из этой папки: docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: dast-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-dast}
      POSTGRES_PASSWORD: ${DB_PASS:-dast}
      POSTGRES_DB: ${DB_NAME:-dast}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dast}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dast-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  dast-server:
    image: ${DAST_SERVER_IMAGE:-deploy-dast-server}:${VERSION:-latest}
    build:
      context: ..
      dockerfile: Dockerfile.server
    container_name: dast-server
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-dast}
      - DB_PASS=${DB_PASS:-dast}
      - DB_NAME=${DB_NAME:-dast}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - WORK_DIR=/workspace/work
    volumes:
      - ../work:/workspace/work
    ports:
      - "${SERVER_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dast-worker:
    image: ${DAST_WORKER_IMAGE:-deploy-dast-worker}:${VERSION:-latest}
    build:
      context: ..
      dockerfile: Dockerfile.worker
    container_name: dast-worker
    user: "0:0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-dast}
      - DB_PASS=${DB_PASS:-dast}
      - DB_NAME=${DB_NAME:-dast}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WORK_DIR=/workspace/work
      - DAST_ZAP_LOCAL=1
      - DAST_ZAP_PORT=9090
      - DAST_WORKER_CONCURRENCY=4
    volumes:
      - ../work:/workspace/work
      - ../templates:/workspace/templates:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: ${NGINX_IMAGE:-deploy-nginx}:${VERSION:-latest}
    build:
      context: ../web/react
      dockerfile: Dockerfile
    container_name: dast-nginx
    ports:
      - "${NGINX_PORT:-80}:80"
    depends_on:
      dast-server:
        condition: service_healthy

volumes:
  postgres_data:
