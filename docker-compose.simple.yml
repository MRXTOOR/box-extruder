version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: dast-postgres
    environment:
      POSTGRES_USER: dast
      POSTGRES_PASSWORD: dast
      POSTGRES_DB: dast
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dast"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dast-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: nginx:alpine
    container_name: dast-frontend
    ports:
      - "3000:80"
    volumes:
      - ./web/react/dist:/usr/share/nginx/html:ro
      - ./web/react/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data: