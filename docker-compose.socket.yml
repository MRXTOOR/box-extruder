# Альтернативный вариант: Docker socket mount (легче, но требует access to host Docker)
# Используйте этот файл если DinD не работает или слишком тяжелый

version: "3.8"

services:
  dast-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dast-scanner
    ports:
      - "8080:8080"
    volumes:
      # Docker socket для запуска ZAP/Katana контейнеров
      - /var/run/docker.sock:/var/run/docker.sock
      # Work directory
      - dast-work:/workspace/work
      # Templates
      - ./templates:/workspace/templates:ro
      # Examples
      - ./examples:/workspace/examples:ro
    environment:
      - DAST_WORKDIR=/workspace/work
      - DAST_ZAP_DOCKER_IMAGE=ghcr.io/zaproxy/zaproxy:stable
      - DAST_KATANA_DOCKER_IMAGE=projectdiscovery/katana:latest
    restart: unless-stopped
    command: ["serve", "-addr", "0.0.0.0:8080", "-work", "/workspace/work"]

volumes:
  dast-work:
    driver: local
