version: "3.8"

services:
  dast-scanner:
    build:
      context: .
      dockerfile: Dockerfile.dind
    container_name: dast-scanner
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - dast-work:/workspace/work
      - ./templates:/workspace/templates:ro
      - ./examples:/workspace/examples:ro
    environment:
      - DAST_SERVE_ADDR./start-dashboard.sh=0.0.0.0:8080
      - DAST_PULL_IMAGES=1
      - GOMEMLIMIT=2GiB
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  dast-work:
    driver: local
