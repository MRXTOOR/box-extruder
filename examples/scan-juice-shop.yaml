# Демо-скан против локального OWASP Juice Shop (слабее httpbin для показа находок).
#
# 1) Поднять приложение:
#      docker compose -f examples/docker-compose.juice-shop.yaml up -d
#    Дождаться ответа на http://127.0.0.1:3000/
#
# 2) Запуск пайплайна (как scan-pipeline-full, но цель — Juice Shop):
#      make run-juice-shop-demo
#    или:
#      export DAST_KATANA_DOCKER_IMAGE=projectdiscovery/katana:latest
#      ./scan run -f examples/scan-juice-shop.yaml -demo -work work
#
# ZAP в Docker не видит 127.0.0.1 как ваш хост: оркестратор подставляет host.docker.internal и
# --add-host=host.docker.internal:host-gateway. Отключить переписывание: DAST_ZAP_NO_LOCALHOST_REMAP=1
#
# Без Docker для ZAP/Katana: добавьте -skip-zap -skip-katana (останется Nuclei по шаблонам).
#
# Аутентификация (без заглушек): провайдер juiceShopLogin вызывает API Juice Shop (POST /rest/user/login,
# затем GET /rest/user/whoami с Bearer JWT), как в образе bkimminich/juice-shop. Учётная запись тестовой среды:
# email задан ниже; пароль только из окружения:
#   export DAST_JUICESHOP_PASSWORD='...'
#
# budgets.verification.evidenceThreshold: low | medium | high — порог «достаточности» HTTP-доказательства для
# progressive confirmation и колонки Quality в отчёте (см. Evidence summary).
#
# Juice Shop содержит реальные классы уязвимостей; не сканируйте чужие системы без разрешения.

version: "1.0"
job:
  name: "dast-juice-shop-demo"
  id: "juice-shop-ctf"

targets:
  - type: "web"
    baseUrl: "http://127.0.0.1:3000/"
    startPoints:
      - "http://127.0.0.1:3000/"

scope:
  allow:
    - "^http://127\\.0\\.0\\.1:3000/.*"
    - "^http://localhost:3000/.*"
  deny: []
  maxUrls: 200

auth:
  strategy: "providerChain"
  providers:
    - type: "juiceShopLogin"
      id: "juice-session"
      secretsRef:
        email: "логин"
        password: "пароль"

scan:
  preset: "Fast"
  plan:
    - stepType: "katana"
      enabled: true
      katanaDepth: 3
      katanaConcurrency: 8
      katanaTimeoutSecs: 30
    - stepType: "zapBaseline"
      enabled: true
      zapDockerImage: "ghcr.io/zaproxy/zaproxy:stable"
      zapAutomationFramework: true
      zapSpiderTraditional: true
      zapSpiderAjax: false
      zapMaxSpiderMinutes: 3
      zapPassiveWaitSeconds: 10
    - stepType: "nucleiTemplates"
      enabled: true
      nucleiIncludeDiscoveredURLs: true
      templatePaths:
        - "templates/example-banner.yaml"
    - stepType: "passive"
      enabled: true
    - stepType: "verification"
      enabled: true

budgets:
  discovery:
    maxDepth: 3
    maxUrls: 180
    durationCrawlSecs: 120
  passive:
    passiveWaitDelaySecs: 5
    passiveRuleDefaultSeverity: "WARN"
  active:
    maxRequestsTotal: 150
    concurrency: 4
    rateLimitRps: 8
  verification:
    maxVerifications: 80
    evidenceThreshold: "low"

noiseControl:
  dedupe:
    locationKey: "endpoint+method+paramsNormalized"
    paramNormalization: "basic"
  falsePositiveWorkflow:
    progressiveConfirmation: true
    verifyOnlyNewOrChanged: false

outputs:
  formats: ["json", "md", "docx"]
  docx:
    templateRef: ""
    includeEvidence: true
  paths:
    artifactsDir: "artifacts"
