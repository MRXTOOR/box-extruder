# Краулинг projectdiscovery/katana: PATH, DAST_KATANA_BIN или DAST_KATANA_DOCKER_IMAGE=projectdiscovery/katana:latest
# https://github.com/projectdiscovery/katana
#
#   make build && ./scan run -f examples/scan-with-katana.yaml -demo -skip-zap -work work
# Без katana: -skip-katana или DAST_SKIP_KATANA_CLI=1.
#
# Вывод -jsonl (без сырых body) превращается в находки INFO (ruleId katana:discovered-url).
# scope.allow / scope.deny мапятся на -cs / -cos; глубина и длительность — из budgets.discovery,
# если не заданы katanaDepth / katanaCrawlDuration в шаге.

version: "1.0"
job:
  name: "dast-katana-demo"
  id: "katana-cli"

targets:
  - type: "web"
    baseUrl: "https://httpbin.org/"
    startPoints: []

scope:
  allow:
    - "^https://httpbin\\.org/.*"
  deny:
    - "^https://httpbin\\.org/delay/"
  maxUrls: 200

auth:
  strategy: "none"

scan:
  preset: "Fast"
  plan:
    - stepType: "katana"
      enabled: true
      katanaDepth: 2
      katanaConcurrency: 5
      katanaTimeoutSecs: 12
      # katanaCrawlDuration: "45s"
      # katanaHeadless: true
      # katanaExtraArgs: ["-fsu"]
    - stepType: "passive"
      enabled: true
    - stepType: "verification"
      enabled: true

budgets:
  discovery:
    maxDepth: 2
    maxUrls: 80
    durationCrawlSecs: 45
  passive:
    passiveWaitDelaySecs: 1
    passiveRuleDefaultSeverity: "WARN"
  active:
    maxRequestsTotal: 50
    concurrency: 3
    rateLimitRps: 8
  verification:
    maxRechecks: 1

noiseControl:
  dedupe:
    locationKey: "endpoint+method+paramsNormalized"
    paramNormalization: "basic"

outputs:
  formats: ["json", "markdown"]
