# Полная связка: Katana (краул) → ZAP (пассив / spider) → Nuclei (шаблоны) с общей сессией auth.
#
# Поток данных:
#   1) Katana и ZAP кладут URL в общую «ленту» пайплайна (HTTP evidence).
#   2) Nuclei с nucleiIncludeDiscoveredURLs: true берёт baseUrl + URL из ленты (лимит: scope.maxUrls или budgets.discovery.maxUrls).
#   3) Встроенный Nuclei добавляет только новые origin (хосты); Nuclei CLI — полные URL (файл job/nuclei-targets.txt + nuclei -l).
#
# Рекомендуемый порядок шагов именно такой: сначала краул/Spider, потом шаблоны.
#
# Локально: Docker для ZAP и (опционально) Katana; встроенный Nuclei — шаблоны из examples/templates/*.yaml
#   make run-pipeline-full
# Или вручную:
#   export DAST_KATANA_DOCKER_IMAGE=projectdiscovery/katana:latest   # если katana не в PATH
#   ./scan run -f examples/scan-pipeline-full.yaml -demo -work work
# В CI без инструментов:
#   ./scan run ... -skip-katana -skip-zap -skip-nuclei
#
# Отдельные примеры: scan-with-katana.yaml, scan-with-zap-automation.yaml, scan-with-nuclei-cli.yaml, scan-as-code.yaml.

version: "1.0"
job:
  name: "dast-full-pipeline"
  id: "full-chain"

targets:
  - type: "web"
    baseUrl: "https://httpbin.org/"
    startPoints:
      - "https://httpbin.org/html"

scope:
  allow:
    - "^https://httpbin\\.org/.*"
  deny:
    - "^https://httpbin\\.org/delay/"
  maxUrls: 120

auth:
  strategy: "none"

scan:
  preset: "Fast"
  plan:
    - stepType: "katana"
      enabled: true
      katanaDepth: 2
      katanaConcurrency: 6
      katanaTimeoutSecs: 15
    - stepType: "zapBaseline"
      enabled: true
      zapDockerImage: "ghcr.io/zaproxy/zaproxy:stable"
      zapAutomationFramework: true
      zapSpiderTraditional: true
      zapSpiderAjax: false
      zapMaxSpiderMinutes: 2
      zapPassiveWaitSeconds: 5
    - stepType: "nucleiTemplates"
      enabled: true
      nucleiIncludeDiscoveredURLs: true
      # Только YAML встроенного движка из корня templates/ (не nuclei-cli/).
      templatePaths:
        - "templates/example-banner.yaml"
    - stepType: "passive"
      enabled: true
    - stepType: "verification"
      enabled: true

budgets:
  discovery:
    maxDepth: 2
    maxUrls: 100
    durationCrawlSecs: 60
  passive:
    passiveWaitDelaySecs: 2
    passiveRuleDefaultSeverity: "WARN"
  active:
    maxRequestsTotal: 80
    concurrency: 4
    rateLimitRps: 10
  verification:
    maxRechecks: 2

noiseControl:
  dedupe:
    locationKey: "endpoint+method+paramsNormalized"
    paramNormalization: "basic"

outputs:
  formats: ["json", "markdown"]
