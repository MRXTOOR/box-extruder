# Встроенный движок Nuclei: GET /?x=<строка из artifacts/payloads/xss.txt>
# Путь payloadFile относителен к корню job (подставляется оркестратором).
id: dast-xss-builtin-probes
name: XSS query param probe (builtin)
severity: info
description: "Перебор XSS-пейлоадов из artifacts/payloads/xss.txt"
http:
  - method: GET
    path: "/"
    payloadQueryParam: "x"
    payloadFile: "artifacts/payloads/xss.txt"
    matchers:
      - type: word
        part: body
        words:
          - "script"
