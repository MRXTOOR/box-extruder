# Минимальный шаблон в синтаксисе projectdiscovery/nuclei (только nucleiEngine: cli).
# Не кладите этот файл в каталог, который грузит встроенный nuclei-like (path там string, не список).
id: nuclei-official-httpbin-smoke

info:
  name: Httpbin body contains httpbin
  author: box-extruder
  severity: info
  description: Smoke для интеграции с официальным nuclei CLI.

http:
  - method: GET
    path:
      - "{{BaseURL}}/"
    matchers:
      - type: word
        part: body
        words:
          - "httpbin"
