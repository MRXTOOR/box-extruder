# Официальный nuclei (projectdiscovery): нужен бинарь в PATH или DAST_NUCLEI_BIN.
# Установка: https://github.com/projectdiscovery/nuclei
#
# Запуск:
#   make build && ./scan run -f examples/scan-with-nuclei-cli.yaml -demo -skip-zap
# Без nuclei в PATH шаг упадёт; в CI без бинаря: добавьте -skip-nuclei или DAST_SKIP_NUCLEI_CLI=1.
# Если nuclei при старте подтягивает тысячи шаблонов из ~/.config — задайте профиль или чистый HOME для изолированного -t.
#
# Шаблон examples/templates/nuclei-cli/nuclei-official-httpbin.yaml — только для nuclei CLI;
# example-banner.yaml рассчитан только на встроенный nuclei-like движок.

version: "1.0"
job:
  name: "dast-nuclei-cli-demo"
  id: "nuclei-cli"

targets:
  - type: "web"
    baseUrl: "https://httpbin.org"

scope:
  allow:
    - "^https://httpbin\\.org/.*"
  deny: []
  maxUrls: 50

auth:
  strategy: "none"

scan:
  preset: "Fast"
  plan:
    - stepType: "crawl"
      enabled: true
    - stepType: "passive"
      enabled: true
    - stepType: "nucleiTemplates"
      enabled: true
      nucleiEngine: "cli"
      templatePaths:
        - "templates/nuclei-cli/nuclei-official-httpbin.yaml"
      # Опционально: не проверять обновления шаблонов при старте nuclei
      # nucleiExtraArgs: ["-duc"]
      nucleiRateLimit: 50
    - stepType: "verification"
      enabled: true

budgets:
  discovery:
    maxDepth: 1
    maxUrls: 10
    durationCrawlSecs: 30
  passive:
    passiveWaitDelaySecs: 1
    passiveRuleDefaultSeverity: "WARN"
  active:
    maxConcurrentRequests: 2
    maxTotalRequests: 20
  verification:
    maxRechecks: 1

noiseControl:
  dedupe:
    locationKey: "endpoint+method+paramsNormalized"
    paramNormalization: "basic"

outputs:
  formats:
    - "json"
    - "markdown"
