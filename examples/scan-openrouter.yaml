version: "1.0"
job:
  name: "dast-openrouter"
targets:
  - type: "web"
    baseUrl: "https://openrouter.ai"
scope:
  allow: ["https://openrouter.ai.*", "https://www.openrouter.ai.*"]
  deny: []
auth:
  strategy: "providerChain"
  providers:
    - type: "form"
      id: "login"
      config:
        loginUrl: "https://openrouter.ai/deepsoil"
        loginPath: "/auth/login"
        usernameField: "email"
        passwordField: "password"
        checkAuthenticatedPath: "/credits"
      secretsRef:
        username: "secret://OPENROUTER_USER"
        password: "secret://OPENROUTER_PASS"
      verification:
        type: "endpointCheck"
        details:
          url: "https://openrouter.ai/credits"
          expectedStatus: 200
scan:
  preset: "Fast"
  katana:
    depth: 3
    maxUrls: 100
noiseControl:
  dedupe:
    locationKey: "endpoint+method+paramsNormalized"
    paramNormalization: "basic"
  suppression:
    allowlist: []
    exclude: []
  falsePositiveWorkflow:
    progressiveConfirmation: true
outputs:
  formats: ["json", "md"]
  paths:
    artifactsDir: "artifacts"
execution:
  dummyFindings: false